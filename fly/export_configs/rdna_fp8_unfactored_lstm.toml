# Export configurations for rdna_fp8_unfactored_lstm_gemm
# Run: python fly/export_fp8_unfactored_lstm.py --config fly/export_configs/rdna_fp8_unfactored_lstm.toml
#
# Each [[configs]] entry compiles a separate HSACO + C header pair.
# The kernel is parameterized by H (hidden dim); the GEMM is hh[B,H] @ W_fused[H,4H].
# M (batch B) is runtime via the grid_m kernel arg; M here only sets the compile-time
# assertion (B % tile_m == 0) and the printed block count. If omitted, uses --M (default 512).
#
# Outputs: artifacts/rdna_fp8_unfactored_lstm_H{H}.hsaco
#          artifacts/rdna_fp8_unfactored_lstm_H{H}.h

[[configs]]
M = 256
H = 1024
